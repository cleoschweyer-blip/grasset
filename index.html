<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Qui veut aller chez Grasset ?</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
    background-color: #0b1d3a;
    color: #d4af37;
    font-family: 'Playfair Display', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
}

h1 { font-size: 2.5em; margin-bottom: 30px; }

button {
    border: 2px solid #d4af37;
    background: none;
    color: #d4af37;
    padding: 12px 24px;
    cursor: pointer;
    font-size: 1.2em;
}

#result {
    margin-top: 40px;
    font-size: 1.8em;
    text-align: center;
    width: 70%;
}
</style>
</head>

<body>

<h1>Qui veut aller chez Grasset ?</h1>
<button onclick="generateTitle()">Proposez votre ouvrage</button>
<div id="result"></div>

<script>

// ===== LEXIQUE =====
const mots = [
{w:"histoire", g:"f"},
{w:"mémoire", g:"f"},
{w:"identité", g:"f"},
{w:"écologie", g:"f"},
{w:"politique", g:"f"},
{w:"culture", g:"f"},
{w:"monde", g:"m"},
{w:"pouvoir", g:"m"},
{w:"temps", g:"m"},
{w:"avenir", g:"m"},
{w:"déclin", g:"m"},
{w:"wokisme", g:"m"},
{w:"post-sécularisme", g:"m"},
{w:"féminisme", g:"m"},
{w:"sanglots", g:"pl"}
];

// contemporain
const contemporain = [
{w:"smartphone", g:"m"},
{w:"algorithme", g:"m"},
{w:"influenceur", g:"m"},
{w:"réseaux sociaux", g:"pl"},
{w:"streaming", g:"m"},
{w:"plateforme", g:"f"},
{w:"intelligence artificielle", g:"f"},
{w:"skateboard", g:"m"}
];

// noms propres
const nomsPropres = [
{w:"Macron", proper:true},
{w:"Musk", proper:true},
{w:"Sébastien Fath", proper:true}
];

// objets absurdes
const legumes = [
{w:"carotte", g:"f"},
{w:"brocoli", g:"m"},
{w:"graines de tournesol", g:"pl"}
];

const politique = [
{w:"gauche", g:"f"},
{w:"droite", g:"f"}
];

const critiques = [
{w:"crise", g:"f"},
{w:"illusion", g:"f"},
{w:"dérive", g:"f"}
];

// ===== OUTILS =====
function isVowel(c){
    return "aeiouyhàâéèêëîïôûù".includes(c.toLowerCase());
}

function det(m){
    if(m.proper) return "";
    if(m.g === "pl") return "les ";
    if(isVowel(m.w[0])) return "l’";
    return m.g === "f" ? "la " : "le ";
}

function deDet(m){
    if(m.proper) return "de ";
    if(m.g === "pl") return "des ";
    if(isVowel(m.w[0])) return "de l’";
    return m.g === "f" ? "de la " : "du ";
}

function capitalize(s){
    return s.charAt(0).toUpperCase() + s.slice(1);
}

function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

// pool global
function fullPool(){
    return [
        ...mots,
        ...contemporain,
        ...nomsPropres,
        ...legumes,
        ...politique
    ];
}

function pickDistinct(){
    let pool = fullPool();
    return pool.sort(()=>0.5-Math.random()).slice(0,3);
}

function hasDuplicateWords(title){
    let words = title.toLowerCase().split(/\s+/);
    return new Set(words).size !== words.length;
}

// ===== GENERATION =====
function generateTitle(){

    let titre = "";
    let tries = 0;

    do{
        let [m1,m2,m3] = pickDistinct();
        let crit = rand(critiques);

        let type = Math.floor(Math.random()*7);

        switch(type){

            case 0:
                titre = capitalize(m1.w) +
                " : enquête sur " + det(m2) + m2.w +
                " " + deDet(m3) + m3.w;
                break;

            case 1:
                titre = capitalize(det(m1) + m1.w) +
                " : essai sur " + det(m2) + m2.w;
                break;

            case 2:
                titre = capitalize(det(m1) + m1.w) +
                " et " + det(m2) + m2.w;
                break;

            case 3:
                titre = capitalize(det(crit) + crit.w) +
                " " + deDet(m1) + m1.w;
                break;

            case 4:
                titre = capitalize(m1.w) +
                " : une histoire " + deDet(m2) + m2.w;
                break;

            // ===== NOUVEAU : FORMAT REALISTE =====
            case 5:
                titre = "Le moment " + m1.w;
                break;

            case 6:
                titre = capitalize(m1.w) +
                " : le moment " + m2.w;
                break;
        }

        tries++;

    } while(hasDuplicateWords(titre) && tries < 10);

    document.getElementById("result").innerText = titre;
}

</script>

</body>
</html>
