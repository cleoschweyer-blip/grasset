<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Qui veut aller chez Grasset ?</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
    background-color: #0b1d3a;
    color: #d4af37;
    font-family: 'Playfair Display', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
}

h1 {
    font-size: 2.5em;
    margin-bottom: 20px;
}

input {
    background-color: #0b1d3a;
    border: 1px solid #d4af37;
    color: #d4af37;
    padding: 8px;
    font-size: 1.1em;
    margin-bottom: 15px;
    text-align: center;
}

button {
    background-color: transparent;
    border: 2px solid #d4af37;
    color: #d4af37;
    padding: 10px 20px;
    margin: 10px;
    font-size: 1.2em;
    cursor: pointer;
}

button:hover {
    background-color: #d4af37;
    color: #0b1d3a;
}

#result {
    margin-top: 30px;
    font-size: 1.8em;
    text-align: center;
    width: 70%;
}
</style>

</head>

<body>

<h1>Qui veut aller chez Grasset ?</h1>

<input id="userInput" placeholder="Entrez votre sujet (optionnel)" />

<button onclick="generateTitle()">Proposez votre ouvrage</button>

<div id="result"></div>

<script>

// ---- dictionnaire avec genre ----
const mots = [
{w:"hasard", g:"m"}, {w:"histoire", g:"f"}, {w:"biologie", g:"f"},
{w:"école", g:"f"}, {w:"télévision", g:"f"}, {w:"ennemi", g:"m"},
{w:"désir", g:"m"}, {w:"tyrannie", g:"f"}, {w:"avenir", g:"m"},
{w:"culture", g:"f"}, {w:"apocalypse", g:"f"}, {w:"réalité", g:"f"},
{w:"politique", g:"f"}, {w:"religion", g:"f"}, {w:"peuple", g:"m"},
{w:"monde", g:"m"}, {w:"france", g:"f"}, {w:"travail", g:"m"},
{w:"guerre", g:"f"}, {w:"mort", g:"f"}, {w:"temps", g:"m"},
{w:"corps", g:"m"}, {w:"vérité", g:"f"}, {w:"pouvoir", g:"m"},
{w:"identité", g:"f"}, {w:"écologie", g:"f"}, {w:"déclin", g:"m"},
{w:"féminisme", g:"m"}
];

const fragments = [
"la fin du",
"le livre noir de",
"la fabrique de",
"le temps de",
"la guerre de",
"le désir de",
"les sanglots de",
"la rafle de",
"le peuple des",
"les chroniques"
];

const complements = [
"essai sur notre époque",
"enquête",
"analyse",
"chronique d’un déclin",
"pour comprendre le monde d'aujourd'hui",
"manifeste",
"contre notre temps"
];

function isVowel(c){
    return ["a","e","i","o","u","y","h"].includes(c);
}

function article(m){
    if(isVowel(m.w[0])) return "l’";
    return m.g === "f" ? "la " : "le ";
}

function de(m){
    if(isVowel(m.w[0])) return "de l’";
    return m.g === "f" ? "de la " : "du ";
}

function capitalize(str){
    return str.charAt(0).toUpperCase() + str.slice(1);
}

function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generateTitle(){

    let input = document.getElementById("userInput").value.trim().toLowerCase();

    let mot1 = input ? {w: input, g:"m"} : rand(mots);
    let mot2 = rand(mots);

    let type = Math.floor(Math.random()*5);
    let titre = "";

    switch(type){

        case 0:
            titre = capitalize(article(mot1) + mot1.w + " " + de(mot2) + mot2.w);
            break;

        case 1:
            titre = "Les " + mot1.w + " " + de(mot2) + mot2.w;
            break;

        case 2:
            titre = capitalize(article(mot1) + mot1.w) + " : " + rand(complements);
            break;

        case 3:
            titre = capitalize(rand(fragments)) + " " + mot1.w;
            break;

        case 4:
            titre = capitalize(article(mot1) + mot1.w) + " - " + rand(complements);
            break;
    }

    document.getElementById("result").innerText = titre;
}

</script>

</body>
</html>
