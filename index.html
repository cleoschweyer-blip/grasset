<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Qui veut aller chez Grasset ?</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Dancing+Script&display=swap" rel="stylesheet">

<style>
body {
    background-color: #0b1d3a;
    color: #d4af37;
    font-family: 'Playfair Display', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
}

h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 2.8em;
    margin-bottom: 60px;
    letter-spacing: 1px;
}

#result {
    font-size: 2em;
    max-width: 700px;
    text-align: center;
    cursor: pointer;
    transition: opacity 0.3s;
}

#result:hover { opacity: 0.7; }

.hint {
    margin-top: 20px;
    font-size: 0.8em;
    opacity: 0.5;
}
</style>
</head>

<body>

<h1>Qui veut aller chez Grasset ?</h1>
<div id="result" onclick="generateTitle()">Cliquez</div>
<div class="hint">(clic = nouveau titre + copie)</div>

<script>

// ===== MOTS ISSUS DES TITRES RÉELS =====
const reservoir = [
"inventaire","liquidation","hasard","pôle","nord","cardinal",
"prophète","matérialisme","Los Angeles","Somalie","idéologie",
"totalitaire","histoire","rêve","avenir","politiques","culturelles",
"télévision","apocalypse","ennemi","tyrannie","lumières","frileux",
"biologie","Darwin","Mendel","école","déchets","obsolescence"
];

// ===== BASE =====
const mots = [
{w:"histoire", g:"f"},
{w:"mémoire", g:"f"},
{w:"identité", g:"f"},
{w:"écologie", g:"f"},
{w:"politique", g:"f"},
{w:"culture", g:"f"},
{w:"sociologie", g:"f"},
{w:"science", g:"f"},
{w:"info-comm", g:"f"},

{w:"monde", g:"m"},
{w:"pouvoir", g:"m"},
{w:"temps", g:"m"},
{w:"avenir", g:"m"},
{w:"déclin", g:"m"},
{w:"wokisme", g:"m"},
{w:"post-sécularisme", g:"m"},
{w:"féminisme", g:"m"},
{w:"communautarisme", g:"m"},
{w:"fromage", g:"m"},

{w:"SHS", g:"pl"},
{w:"sanglots", g:"pl"}
];

// ===== ABSURDE =====
const absurdes = [
{w:"skateboard", g:"m"},
{w:"brocoli", g:"m"},
{w:"graines de tournesol", g:"pl"},
{w:"chaussette", g:"f"},
{w:"chat", g:"m"},
{w:"sieste", g:"f"}
];

// ===== CONTEMPORAIN =====
const contemporain = [
{w:"algorithme", g:"m"},
{w:"réseaux sociaux", g:"pl"},
{w:"intelligence artificielle", g:"f"}
];

// ===== NOMS PROPRES =====
const nomsPropres = [
{w:"Macron", proper:true},
{w:"Curtis Yarvin", proper:true},
{w:"Bardella", proper:true},
{w:"Marie-Paupiette", proper:true},
{w:"Retailleau", proper:true},
{w:"Léon XIV", proper:true},
{w:"Trump", proper:true},
{w:"Douglas Wilson", proper:true},
{w:"Nathalie Heinich", proper:true},
{w:"Sébastien Fath", proper:true}
];

// ===== OUTILS =====
function isVowel(c){
    return "aeiouyhàâéèêëîïôûù".includes(c.toLowerCase());
}

function det(m){
    if(m.proper) return "";
    if(m.g === "pl") return "les ";
    if(isVowel(m.w[0])) return "l’";
    return m.g === "f" ? "la " : "le ";
}

function deDet(m){
    if(m.proper) return "de ";
    if(m.g === "pl") return "des ";
    if(isVowel(m.w[0])) return "de l’";
    return m.g === "f" ? "de la " : "du ";
}

function capitalize(s){
    return s.charAt(0).toUpperCase() + s.slice(1);
}

function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

// ===== CLEAN STRICT =====
function cleanTitle(str){
    return str
        .replace(/\bde\s+du\b/g,"du")
        .replace(/\bde\s+des\b/g,"des")
        .replace(/\bde\s+de\b/g,"de")
        .replace(/\bde\s+de la\b/g,"de la")
        .replace(/\bde\s+de l[’']/g,"de l’")
        .replace(/\ble ([aeiouyhàâéèêëîïôûù])/gi,"l’$1")
        .replace(/\bla ([aeiouyhàâéèêëîïôûù])/gi,"l’$1")
        .replace(/\s+/g," ")
        .trim();
}

// ===== PICK =====
function pick(){
    let base = [...mots, ...contemporain, ...nomsPropres];

    if(Math.random() < 0.6){
        base.push({w:rand(reservoir), g:"m"});
    }

    if(Math.random() < 0.4){
        base = [...base, ...absurdes];
    }

    return rand(base);
}

// ===== GENERATION =====
let lastType = -1;

function generateTitle(){

    let titre = "";
    let tries = 0;
    let type;

    do{
        let m1 = pick();
        let m2 = pick();
        let m3 = pick();

        do{
            type = Math.floor(Math.random()*4);
        } while(type === lastType);

        switch(type){

            case 0:
                titre = m1.w +
                " : enquête sur " + det(m2) + m2.w +
                " " + deDet(m3) + m3.w;
                break;

            case 1:
                titre = det(m1) + m1.w +
                " et " + det(m2) + m2.w;
                break;

            case 2:
                titre = "Le moment " + m1.w;
                break;

            case 3:
                titre = m1.w +
                " : pourquoi tout a changé";
                break;
        }

        tries++;

    } while(new Set(titre.split(" ")).size !== titre.split(" ").length && tries < 10);

    lastType = type;

    titre = cleanTitle(capitalize(titre));

    document.getElementById("result").innerText = titre;
    navigator.clipboard.writeText(titre);
}

</script>

</body>
</html>
