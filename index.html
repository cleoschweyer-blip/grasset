<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Qui veut aller chez Grasset ?</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Dancing+Script&display=swap" rel="stylesheet">

<style>
body {
    background-color: #0b1d3a;
    color: #d4af37;
    font-family: 'Playfair Display', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
}

h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 2.8em;
    margin-bottom: 60px;
}

#result {
    font-size: 2em;
    max-width: 700px;
    text-align: center;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Qui veut aller chez Grasset ?</h1>
<div id="result" onclick="generateTitle()">Cliquez</div>

<script>

// ===== LEXIQUE =====
const mots = [
{w:"histoire", g:"f"}, {w:"mémoire", g:"f"}, {w:"identité", g:"f"},
{w:"écologie", g:"f"}, {w:"politique", g:"f"}, {w:"culture", g:"f"},
{w:"sociologie", g:"f"}, {w:"science", g:"f"}, {w:"info-comm", g:"f"},
{w:"théorie", g:"f"},

{w:"monde", g:"m"}, {w:"pouvoir", g:"m"}, {w:"temps", g:"m"},
{w:"avenir", g:"m"}, {w:"déclin", g:"m"},
{w:"wokisme", g:"m"}, {w:"post-sécularisme", g:"m"},
{w:"féminisme", g:"m"}, {w:"communautarisme", g:"m"},
{w:"fromage", g:"m"},

{w:"SHS", g:"pl"}, {w:"sanglots", g:"pl"}
];

const absurdes = [
{w:"skateboard", g:"m"},
{w:"brocoli", g:"m"},
{w:"chaussette", g:"f"},
{w:"chat", g:"m"}
];

const nomsPropres = [
{w:"Macron", proper:true},
{w:"Bardella", proper:true},
{w:"Trump", proper:true},
{w:"Curtis Yarvin", proper:true},
{w:"Retailleau", proper:true},
{w:"Nathalie Heinich", proper:true}
];

const reservoir = [
{w:"inventaire", g:"m"},
{w:"liquidation", g:"f"},
{w:"hasard", g:"m"},
{w:"obsolescence", g:"f"},
{w:"idéologie", g:"f"},
{w:"tyrannie", g:"f"},
{w:"lumières", g:"pl"},
{w:"frileux", g:"pl"},
{w:"biologie", g:"f"}
];

// ===== OUTILS =====
function isVowel(c){
    return "aeiouyhàâéèêëîïôûù".includes(c.toLowerCase());
}

function det(m){
    if(m.proper) return "";
    if(m.g==="pl" || m.w.endsWith("s")) return "les ";
    if(isVowel(m.w[0])) return "l’";
    return m.g==="f" ? "la " : "le ";
}

function deDet(m){
    if(m.proper) return "de ";
    if(m.g==="pl" || m.w.endsWith("s")) return "des ";
    if(isVowel(m.w[0])) return "de l’";
    return m.g==="f" ? "de la " : "du ";
}

function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function capitalize(s){
    return s.charAt(0).toUpperCase()+s.slice(1);
}

// ===== CLEAN =====
function clean(str){
    return str
        .replace(/\bde\s+du\b/g,"du")
        .replace(/\bde\s+des\b/g,"des")
        .replace(/\bde\s+de\b/g,"de")
        .replace(/\bdu\s+du\b/g,"du")
        .replace(/\bdes\s+des\b/g,"des")
        .replace(/\ble ([aeiouyhàâéèêëîïôûù])/gi,"l’$1")
        .replace(/\bla ([aeiouyhàâéèêëîïôûù])/gi,"l’$1")
        .replace(/\s+/g," ")
        .trim();
}

// ===== PICK =====
function pick(){
    let pool = [...mots, ...nomsPropres];

    if(Math.random()<0.5){
        pool.push(rand(reservoir));
    }

    if(Math.random()<0.4){
        pool = [...pool, ...absurdes];
    }

    return rand(pool);
}

// ===== FILTRES =====
function hasDuplicateWords(t){
    let w = t.toLowerCase().split(/\s+/);
    return new Set(w).size !== w.length;
}

function countProper(...items){
    return items.filter(x=>x.proper).length;
}

// 🔥 NOUVELLE RÈGLE
function isBadProperCombo(m1, m2){
    return m1.proper && !m2.proper;
}

// ===== MÉMOIRE =====
let lastType = -1;
let lastMainWord = "";

// ===== GENERATION =====
function generateTitle(){

    let titre, type, m1, m2, m3;

    do{

        m1 = pick();
        m2 = pick();
        m3 = pick();

        if(countProper(m1,m2,m3)>1) continue;
        if(m1.w===m2.w || m2.w===m3.w) continue;

        do{
            type = Math.floor(Math.random()*4);
        } while(type===lastType);

        // 🔥 sécurité ajoutée
        if(isBadProperCombo(m1, m2) && type === 0) continue;

        switch(type){

            case 0:
                titre = m1.w +
                " : enquête sur " + det(m2) + m2.w;

                if(!m2.proper && m2.w !== m3.w){
                    titre += " " + deDet(m3) + m3.w;
                }
                break;

            case 1:
                titre = det(m1) + m1.w +
                " et " + det(m2) + m2.w;
                break;

            case 2:
                titre = "Le moment " + m1.w;
                break;

            case 3:
                titre = m1.w +
                " : pourquoi tout a changé";
                break;
        }

    } while(
        hasDuplicateWords(titre) ||
        m1.w === lastMainWord ||
        titre.length < 12
    );

    lastType = type;
    lastMainWord = m1.w;

    titre = clean(capitalize(titre));

    document.getElementById("result").innerText = titre;
    navigator.clipboard.writeText(titre);
}

</script>

</body>
</html>
